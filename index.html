<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KENZO PRO | Editor de Alta Qualidade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #111111;
            --card-bg: #1c1c1e;
            --accent: #00e676;
            --accent-glow: #00e67633;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-subtle: #2c2c2e;
            --danger: #ff3b30;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 16px 48px 16px;
        }

        /* Header com estilo neon */
        .header {
            text-align: center;
            margin-bottom: 32px;
            width: 100%;
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .badge {
            background: var(--accent-glow);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent);
            display: inline-block;
            margin-top: 8px;
            backdrop-filter: blur(4px);
        }

        /* Container principal */
        .main-editor {
            max-width: 1300px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Área da imagem + dropzone */
        .preview-container {
            background: var(--panel-bg);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            transition: border 0.2s;
        }

        .preview-area {
            background: #0b0b0b;
            border-radius: 20px;
            min-height: 460px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: auto;
            border: 2px dashed #2a2a2a;
            transition: all 0.2s ease;
        }

        .preview-area.drag-over {
            border-color: var(--accent);
            background: #1a2a1a;
            box-shadow: inset 0 0 0 2px var(--accent-glow);
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: filter 0.1s ease;
        }

        #placeholderText {
            position: absolute;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 500;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            pointer-events: none;
            font-size: 1rem;
            z-index: 2;
        }

        /* Info da imagem */
        .image-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 8px;
        }

        .image-info span {
            font-family: monospace;
            background: #1e1e1e;
            padding: 4px 10px;
            border-radius: 40px;
        }

        /* Painel de filtros (grid responsivo) */
        .controls-panel {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(2px);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 24px 28px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .filter-group label span:first-child {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .value-display {
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent);
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #2c2c2e;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px var(--accent);
            transition: 0.1s;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* Botões principais */
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c2c2e;
            color: white;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 2px 8px rgba(0,230,118,0.3);
        }

        .btn-primary:hover {
            background: #00c464;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,230,118,0.3);
        }

        .btn-secondary {
            background: #3d5afe;
            box-shadow: 0 2px 8px rgba(61,90,254,0.3);
        }

        .btn-secondary:hover {
            background: #536dfe;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #38383a;
            border: 1px solid #4a4a4c;
        }

        .btn-reset:hover {
            background: #4a4a4c;
        }

        .btn:active {
            transform: scale(0.96);
        }

        #fileInput {
            display: none;
        }

        /* rodapé pequeno */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5e5e62;
            margin-top: 32px;
        }

        @media (max-width: 680px) {
            .header h1 { font-size: 1.8rem; }
            .actions .btn { padding: 10px 20px; font-size: 0.8rem; }
            .filters-grid { gap: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⚡ EDITOR KENZO · PRO</h1>
    <div class="badge">ALTA QUALIDADE · SEM PERDAS</div>
</div>

<div class="main-editor">
    <div class="preview-container">
        <div class="preview-area" id="dropZone">
            <canvas id="mainCanvas" style="display: block;"></canvas>
            <div id="placeholderText">📸 Arraste uma foto ou clique em "Abrir Foto"<br>Suporte a qualidade original</div>
        </div>
        <div class="image-info" id="imgInfo">
            <span>📁 Nenhuma imagem carregada</span>
            <span>✨ Edição em tempo real</span>
        </div>
    </div>

    <div class="controls-panel">
        <div class="filters-grid" id="filtersGrid">
            <!-- Brilho -->
            <div class="filter-group">
                <label><span>💡 Brilho</span><span class="value-display" id="brightnessVal">100%</span></label>
                <input type="range" id="brightness" min="0" max="200" value="100" step="1">
            </div>
            <!-- Contraste -->
            <div class="filter-group">
                <label><span>🎛️ Contraste</span><span class="value-display" id="contrastVal">100%</span></label>
                <input type="range" id="contrast" min="0" max="200" value="100" step="1">
            </div>
            <!-- Saturação -->
            <div class="filter-group">
                <label><span>🌈 Saturação</span><span class="value-display" id="saturateVal">100%</span></label>
                <input type="range" id="saturate" min="0" max="200" value="100" step="1">
            </div>
            <!-- Sépia -->
            <div class="filter-group">
                <label><span>🟫 Sépia (Retro)</span><span class="value-display" id="sepiaVal">0%</span></label>
                <input type="range" id="sepia" min="0" max="100" value="0" step="1">
            </div>
            <!-- Grayscale (extra) -->
            <div class="filter-group">
                <label><span>⚫ Grayscale (P&B)</span><span class="value-display" id="grayscaleVal">0%</span></label>
                <input type="range" id="grayscale" min="0" max="100" value="0" step="1">
            </div>
            <!-- Matiz (Hue-rotate) -->
            <div class="filter-group">
                <label><span>🎨 Matiz (Hue)</span><span class="value-display" id="hueVal">0°</span></label>
                <input type="range" id="hueRotate" min="0" max="360" value="0" step="1">
            </div>
            <!-- Desfoque -->
            <div class="filter-group">
                <label><span>🌀 Desfoque</span><span class="value-display" id="blurVal">0px</span></label>
                <input type="range" id="blur" min="0" max="12" value="0" step="0.5">
            </div>
            <!-- Inverter -->
            <div class="filter-group">
                <label><span>🔄 Inverter Cores</span><span class="value-display" id="invertVal">0%</span></label>
                <input type="range" id="invert" min="0" max="100" value="0" step="1">
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-secondary" id="uploadBtn">📂 Abrir Foto</button>
        <button class="btn btn-reset" id="resetBtn">⟳ Resetar Filtros</button>
        <button class="btn btn-primary" id="savePngBtn">💾 Salvar PNG (Sem perdas)</button>
        <button class="btn btn-primary" id="saveJpgBtn">📸 Salvar JPG (Alta Qualidade)</button>
    </div>
    <div class="footer-note">
        ⚡ Edição não destrutiva | Exporta resolução original | Filtros profissionais
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const savePngBtn = document.getElementById('savePngBtn');
        const saveJpgBtn = document.getElementById('saveJpgBtn');
        const placeholderText = document.getElementById('placeholderText');
        const imgInfoSpan = document.querySelector('#imgInfo span:first-child');

        // Controles (filtros)
        const brightnessSlider = document.getElementById('brightness');
        const contrastSlider = document.getElementById('contrast');
        const saturateSlider = document.getElementById('saturate');
        const sepiaSlider = document.getElementById('sepia');
        const grayscaleSlider = document.getElementById('grayscale');
        const hueRotateSlider = document.getElementById('hueRotate');
        const blurSlider = document.getElementById('blur');
        const invertSlider = document.getElementById('invert');

        // Value displays
        const brightnessVal = document.getElementById('brightnessVal');
        const contrastVal = document.getElementById('contrastVal');
        const saturateVal = document.getElementById('saturateVal');
        const sepiaVal = document.getElementById('sepiaVal');
        const grayscaleVal = document.getElementById('grayscaleVal');
        const hueVal = document.getElementById('hueVal');
        const blurVal = document.getElementById('blurVal');
        const invertVal = document.getElementById('invertVal');

        // Estado da imagem original (alta resolução)
        let originalImage = null;       // Image object
        let imageLoaded = false;

        // Atualiza valores textuais
        function updateValueDisplays() {
            brightnessVal.innerText = brightnessSlider.value + '%';
            contrastVal.innerText = contrastSlider.value + '%';
            saturateVal.innerText = saturateSlider.value + '%';
            sepiaVal.innerText = sepiaSlider.value + '%';
            grayscaleVal.innerText = grayscaleSlider.value + '%';
            hueVal.innerText = hueRotateSlider.value + '°';
            blurVal.innerText = parseFloat(blurSlider.value).toFixed(1) + 'px';
            invertVal.innerText = invertSlider.value + '%';
        }

        // Constrói a string de filtros CSS para o canvas (alta qualidade)
        function buildFilterString() {
            const brightness = brightnessSlider.value + '%';
            const contrast = contrastSlider.value + '%';
            const saturate = saturateSlider.value + '%';
            const sepia = sepiaSlider.value + '%';
            const grayscale = grayscaleSlider.value + '%';
            const hueRotate = hueRotateSlider.value + 'deg';
            const blur = blurSlider.value + 'px';
            const invert = invertSlider.value + '%';

            // Ordem clássica de filtros para efeito profissional (brilho/contraste/saturação primeiro, depois efeitos retro)
            return `brightness(${brightness}) contrast(${contrast}) saturate(${saturate}) sepia(${sepia}) grayscale(${grayscale}) hue-rotate(${hueRotate}) blur(${blur}) invert(${invert})`;
        }

        // Aplica os filtros e redesenha com alta qualidade mantendo dimensões originais
        function applyFilters() {
            if (!originalImage || !imageLoaded) return;

            // Atualiza displays antes de renderizar
            updateValueDisplays();

            // Garantir que canvas tenha as dimensões exatas da imagem original (sem perda de resolução)
            if (canvas.width !== originalImage.width || canvas.height !== originalImage.height) {
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
            }

            // Aplica o filtro combinado
            ctx.filter = buildFilterString();
            
            // Limpa e desenha com smoothing de alta qualidade (mesmo sem scale, boa prática)
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';   // Para futuros redimensionamentos, garantia extra
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        }

        // Carrega a imagem a partir de um arquivo (blob/file)
        function loadImageFromFile(file) {
            if (!file || !file.type.match('image.*')) {
                alert("⚠️ Por favor, selecione um arquivo de imagem válido (JPEG, PNG, WebP, etc).");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.onload = function() {
                    // Armazena imagem de alta resolução
                    originalImage = img;
                    imageLoaded = true;
                    
                    // Define canvas na resolução nativa da imagem (garantia de fidelidade)
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // Oculta placeholder
                    placeholderText.style.display = 'none';
                    
                    // Atualiza info da imagem com dimensões reais
                    imgInfoSpan.innerHTML = `📸 ${img.width} x ${img.height} px · ${Math.round((img.width*img.height*4)/1048576 * 10)/10} MP`;
                    
                    // Aplica os filtros atuais imediatamente
                    applyFilters();
                };
                img.onerror = () => {
                    alert("Erro ao carregar a imagem. Tente um formato diferente.");
                };
                img.src = evt.target.result;
            };
            reader.onerror = () => alert("Erro na leitura do arquivo.");
            reader.readAsDataURL(file);
        }

        // Resetar todos os filtros para valores padrão (alta qualidade natural)
        function resetFilters() {
            brightnessSlider.value = '100';
            contrastSlider.value = '100';
            saturateSlider.value = '100';
            sepiaSlider.value = '0';
            grayscaleSlider.value = '0';
            hueRotateSlider.value = '0';
            blurSlider.value = '0';
            invertSlider.value = '0';
            
            updateValueDisplays();
            if (imageLoaded && originalImage) {
                applyFilters();
            }
        }

        // Eventos dos sliders
        const sliders = [brightnessSlider, contrastSlider, saturateSlider, sepiaSlider, grayscaleSlider, hueRotateSlider, blurSlider, invertSlider];
        sliders.forEach(slider => {
            slider.addEventListener('input', () => {
                if (imageLoaded) applyFilters();
                else updateValueDisplays();
            });
        });

        // Upload via botão
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadImageFromFile(e.target.files[0]);
            }
            fileInput.value = ''; // permite recarregar o mesmo arquivo depois
        });

        // Reset manual
        resetBtn.addEventListener('click', resetFilters);

        // Salvar PNG (sem compressão / alta qualidade)
        function saveAsPNG() {
            if (!imageLoaded || !originalImage) {
                alert("📌 Carregue uma imagem primeiro para salvar.");
                return;
            }
            try {
                // Força a renderização final com filtros ativos antes de exportar
                applyFilters();
                // Usa formato PNG nativo (lossless) com resolução máxima
                const pngData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'KENZO_EDIT_ALTA_QUALIDADE.png';
